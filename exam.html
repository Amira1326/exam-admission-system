<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الطالب</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans Arabic',sans-serif; background:#FBF7EC; background-image:linear-gradient(rgba(31,42,36,.06) 1px, transparent 1px); background-size:100% 32px; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; color:#1F2A24; }
.exam-container { background:#fff; border-radius:20px; padding:32px; max-width:720px; width:100%; box-shadow:0 16px 40px rgba(31,42,36,.10); border:1px solid rgba(31,42,36,.1); }
.exam-container.ltr { direction:ltr; }
.exam-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:12px; border-bottom:2px solid #EDE7D8; }
.exam-title { font-size:19px; font-weight:700; }
.stage-badge { font-size:13px; font-weight:700; padding:4px 12px; border-radius:16px; margin-right:8px; background:rgba(43,69,112,.1); color:#2B4570; }
.exam-timer { font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:600; color:#D64545; background:#FBEAEA; padding:6px 14px; border-radius:10px; }
.bar { height:6px; background:#EDE7D8; border-radius:4px; overflow:hidden; margin:8px 0; }
.bar .fill { height:100%; background:linear-gradient(90deg,#1D2F4E,#2B4570); width:0%; transition:width .3s; }
.info-row { display:flex; justify-content:space-between; font-size:13px; color:#7A8378; }
.section-badge { display:inline-block; padding:4px 14px; border-radius:16px; font-size:12px; font-weight:700; margin-bottom:12px; background:rgba(43,69,112,.1); color:#2B4570; }
.passage-box { background:#FBF7EC; border-radius:14px; padding:16px; margin-bottom:16px; border-right:4px solid #2B4570; }
.passage-title { font-weight:700; margin-bottom:6px; }
.passage-text { line-height:1.8; background:#fff; border-radius:10px; padding:10px 14px; }
.question-number { font-size:13px; font-weight:700; margin-bottom:4px; color:#2B4570; }
.question-text { font-size:17px; font-weight:700; margin-bottom:14px; line-height:1.6; }
.options { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.option { display:flex; align-items:center; gap:12px; padding:12px 16px; border:2px solid #EDE7D8; border-radius:12px; cursor:pointer; background:#FBF9F3; }
.option.selected { border-color:#D64545; background:rgba(214,69,69,.05); box-shadow:0 0 0 3px rgba(214,69,69,.1); }
.radio { width:18px; height:18px; border-radius:50%; border:2px solid #EDE7D8; flex-shrink:0; }
.option.selected .radio { border-color:#D64545; background:#D64545; }
.written-notice { background:#FBF7EC; border-right:4px solid #2B4570; padding:12px 16px; border-radius:10px; margin-bottom:10px; font-size:13px; }
.upload-area { border:2px dashed #EDE7D8; border-radius:12px; padding:20px; text-align:center; cursor:pointer; background:#FBF9F3; }
.upload-area i { font-size:30px; color:#2B4570; margin-bottom:6px; display:block; }
#uploadPreview img { max-width:100%; max-height:150px; border-radius:10px; border:2px solid #EDE7D8; margin-top:10px; }
.exam-actions { display:flex; gap:10px; margin-top:14px; }
.btn { flex:1; padding:13px 18px; border:none; border-radius:12px; font-weight:700; font-family:'IBM Plex Sans Arabic',sans-serif; cursor:pointer; }
.btn-primary { background:linear-gradient(135deg,#1D2F4E,#2B4570); color:#fff; }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }
.btn-secondary { background:#EDE7D8; }
.btn-secondary:disabled { opacity:.3; }
.dots { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px; }
.dot { width:28px; height:28px; border-radius:50%; border:2px solid #EDE7D8; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:pointer; background:#FBF9F3; }
.dot.active { border-color:#2B4570; background:#2B4570; color:#fff; }
.dot.answered { border-color:#2F9E63; background:#2F9E63; color:#fff; }
.final-result { text-align:center; padding:20px; }
.final-result .total-score { font-family:'IBM Plex Mono',monospace; font-size:52px; font-weight:600; color:#2B4570; }
.hidden { display:none !important; }
.loading-screen { text-align:center; padding:40px; }
</style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div id="loadingScreen" class="loading-screen">
        <h2>⏳ جاري تحميل بيانات الاختبار...</h2>
    </div>

    <div id="examUI" class="hidden">
        <div class="exam-header">
            <div class="exam-title">📝 اختبار <span id="subjectTitle"></span><span class="stage-badge" id="stageBadge"></span></div>
            <div class="exam-timer" id="timerDisplay">⏱️ --:--</div>
        </div>
        <div id="examContent">
            <div class="info-row"><span id="questionCounter"></span><span id="scoreDisplay"></span></div>
            <div class="bar"><div class="fill" id="progressFill"></div></div>
            <div id="questionContainer">
                <div class="section-badge" id="sectionBadge"></div>
                <div id="passageContainer" class="hidden">
                    <div class="passage-box">
                        <div class="passage-title" id="passageTitle"></div>
                        <div id="passageImageContainer" class="hidden" style="text-align:center;margin:10px 0;">
                            <img id="passageImage" src="" style="max-width:100%;max-height:200px;border-radius:12px;" />
                        </div>
                        <div class="passage-text" id="passageText"></div>
                    </div>
                </div>
                <div class="question-number" id="qNumber"></div>
                <div class="question-text" id="qText"></div>
                <div id="qImageContainer" class="hidden" style="text-align:center;margin-bottom:14px;">
                    <img id="qImage" src="" style="max-width:100%;max-height:220px;border-radius:12px;border:2px solid #e8ddd0;" />
                </div>
                <div class="options" id="optionsContainer"></div>
                <div id="matchContainer" class="hidden" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;"></div>
                <div id="writtenContainer" class="hidden">
                    <div class="written-notice"><i class="fas fa-pencil"></i> <span id="writtenInstructions"></span></div>
                    <div id="writtenImageContainer" class="hidden" style="text-align:center;margin-bottom:10px;">
                        <img id="writtenImage" src="" style="max-width:100%;max-height:200px;border-radius:12px;border:2px solid #e8ddd0;" />
                    </div>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i><p>اضغط لرفع صورة الحل</p>
                        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="uploadWrittenSolution(this)" />
                    </div>
                    <div id="uploadPreview" class="hidden"><img id="previewImg" src="#" /></div>
                </div>
            </div>
            <div class="exam-actions">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled><i class="fas fa-arrow-right"></i> السابق</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>التالي <i class="fas fa-arrow-left"></i></button>
            </div>
            <div class="dots" id="dotsContainer"></div>
        </div>
    </div>
</div>

<script>
// ============================================================
// حالة الاختبار
// ============================================================
let studentId = sessionStorage.getItem('examStudentId');
let secretCode = sessionStorage.getItem('examSecretCode');
let studentInfo = null;
let stagesList = []; // [{subject, questions, passage, timeMinutes}]
let currentStageIdx = 0;
let currentQuestionIdx = 0;
let answers = {};
let matchAnswers = {};
let writtenUploads = {};
let timerSeconds = 0;
let timerInterval = null;
let allResults = [];

const SUBJECT_LABELS = { english:'📘 إنجليزي', math:'📗 رياضيات', arabic:'📙 عربي' };
const SUBJECT_TIME = { english:25, math:20, arabic:20 };

async function init(){
    if(!studentId || !secretCode){
        document.getElementById('loadingScreen').innerHTML = '<h2>⚠️ لم يتم العثور على بيانات الطالب. الرجاء الدخول من صفحة التسجيل.</h2>';
        return;
    }
    // التحقق من صلاحية الطالب يتم ضمنياً داخل get_exam_questions لكل مادة
    await loadStages();
}

async function loadStages(){
    // نحدد المواد: نجلب حالة الطالب أولاً عبر get_exam_questions التي تتحقق من الاعتماد ضمنياً
    const subjectsToTry = ['english','math','arabic'];
    stagesList = [];
    for(const subject of subjectsToTry){
        const { data: questions, error } = await sb.rpc('get_exam_questions', {
            p_student_id: studentId, p_secret_code: secretCode, p_subject: subject
        });
        if(error){
            if(error.message.includes('NOT_AUTHORIZED')){
                document.getElementById('loadingScreen').innerHTML = '<h2>⚠️ غير مصرح لك بدخول الاختبار (تحقق من الموافقة على طلبك)</h2>';
                return;
            }
            continue;
        }
        if(questions && questions.length>0){
            const { data: passageRows } = await sb.rpc('get_passage', { p_student_id: studentId, p_secret_code: secretCode, p_subject: subject });
            stagesList.push({
                subject, questions, passage: (passageRows && passageRows[0]) || null,
                timeMinutes: SUBJECT_TIME[subject] || 20
            });
        }
    }
    if(stagesList.length===0){
        document.getElementById('loadingScreen').innerHTML = '<h2>⚠️ لا توجد أسئلة متاحة لمرحلتك الدراسية حالياً. تواصل مع الإدارة.</h2>';
        return;
    }
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('examUI').classList.remove('hidden');
    startStage(0);
}

function startStage(idx){
    currentStageIdx = idx;
    currentQuestionIdx = 0;
    answers = {}; writtenUploads = {}; matchAnswers = {};
    const stage = stagesList[idx];
    clearInterval(timerInterval);
    timerSeconds = stage.timeMinutes*60;
    document.getElementById('timerDisplay').textContent = '⏱️ ' + String(stage.timeMinutes).padStart(2,'0') + ':00';
    document.getElementById('subjectTitle').textContent = SUBJECT_LABELS[stage.subject];
    document.getElementById('stageBadge').textContent = `المرحلة ${idx+1} من ${stagesList.length}`;
    document.getElementById('sectionBadge').textContent = 'قسم ' + SUBJECT_LABELS[stage.subject];

    const passageContainer = document.getElementById('passageContainer');
    if(stage.passage){
        document.getElementById('passageTitle').textContent = stage.passage.title || '';
        document.getElementById('passageText').textContent = stage.passage.body || '';
        const passageImageContainer = document.getElementById('passageImageContainer');
        if(stage.passage.image_url){ passageImageContainer.classList.remove('hidden'); document.getElementById('passageImage').src = stage.passage.image_url; }
        else passageImageContainer.classList.add('hidden');
    } else passageContainer.classList.add('hidden');

    document.getElementById('examApp').classList.toggle('ltr', stage.subject==='english' || stage.subject==='math');

    renderQuestion();
    startTimer();
}

function renderQuestion(){
    const stage = stagesList[currentStageIdx];
    const q = stage.questions[currentQuestionIdx];
    const total = stage.questions.length;

    document.getElementById('qNumber').textContent = `السؤال ${currentQuestionIdx+1} من ${total}`;
    document.getElementById('qText').textContent = q.question_text;

    const passageContainer = document.getElementById('passageContainer');
    if(stage.passage && currentQuestionIdx < 5){ passageContainer.classList.remove('hidden'); }
    else { passageContainer.classList.add('hidden'); }

    const qImageContainer = document.getElementById('qImageContainer');
    if(q.image_url){ qImageContainer.classList.remove('hidden'); document.getElementById('qImage').src = q.image_url; }
    else qImageContainer.classList.add('hidden');

    const optionsContainer = document.getElementById('optionsContainer');
    const writtenContainer = document.getElementById('writtenContainer');
    const matchContainer = document.getElementById('matchContainer');
    optionsContainer.classList.remove('hidden'); writtenContainer.classList.add('hidden'); matchContainer.classList.add('hidden');
    optionsContainer.innerHTML=''; matchContainer.innerHTML='';

    if(q.type==='mcq'){
        const letters=['أ','ب','ج','د'];
        (q.options||[]).forEach((opt,i)=>{
            const div=document.createElement('div');
            div.className='option'+(answers[q.id]===i?' selected':'');
            div.onclick=()=>{ answers[q.id]=i; renderQuestion(); };
            div.innerHTML=`<div class="radio"></div><div>${letters[i]||i}. ${opt}</div>`;
            optionsContainer.appendChild(div);
        });
    } else if(q.type==='match'){
        optionsContainer.classList.add('hidden');
        matchContainer.classList.remove('hidden');
        matchAnswers[q.id] = matchAnswers[q.id] || {};
        (q.match_items||[]).forEach((item, idx)=>{
            const box = document.createElement('div');
            box.style.cssText = 'background:#faf8f5;border:2px solid #e8ddd0;border-radius:14px;padding:14px;text-align:center;';
            const imgHtml = item.image ? `<img src="${item.image}" style="max-width:100%;max-height:90px;border-radius:10px;margin-bottom:8px;" />` : `<div style="font-size:32px;margin-bottom:6px;">${item.label||''}</div>`;
            const currentVal = matchAnswers[q.id][idx] || '';
            const optionsHtml = (q.match_options||[]).map(o=>`<option value="${o}" ${o===currentVal?'selected':''}>${o}</option>`).join('');
            box.innerHTML = `${imgHtml}<select style="width:100%;padding:8px;border-radius:8px;border:2px solid #e8ddd0;" onchange="selectMatch('${q.id}', ${idx}, this.value)"><option value="">--</option>${optionsHtml}</select>`;
            matchContainer.appendChild(box);
        });
    } else if(q.type==='written'){
        optionsContainer.classList.add('hidden');
        writtenContainer.classList.remove('hidden');
        document.getElementById('writtenInstructions').textContent = q.instructions || 'يرجى حل السؤال على ورقة خارجية ورفع صورة الحل.';
        const writtenImageContainer = document.getElementById('writtenImageContainer');
        if(q.image_url){ writtenImageContainer.classList.remove('hidden'); document.getElementById('writtenImage').src = q.image_url; }
        else writtenImageContainer.classList.add('hidden');
        const preview=document.getElementById('uploadPreview');
        if(writtenUploads[q.id]){ preview.classList.remove('hidden'); document.getElementById('previewImg').src=writtenUploads[q.id]; }
        else preview.classList.add('hidden');
    }

    const pct = ((currentQuestionIdx+1)/total)*100;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('questionCounter').textContent = `السؤال ${currentQuestionIdx+1} من ${total}`;
    document.getElementById('scoreDisplay').textContent = `📊 ${Object.keys(answers).length} من ${total} تمت الإجابة`;

    document.getElementById('prevBtn').disabled = currentQuestionIdx===0;
    const answered = isAnswered(q);
    document.getElementById('nextBtn').disabled = !answered;
    document.getElementById('nextBtn').innerHTML = currentQuestionIdx===total-1 ? 'إنهاء المرحلة <i class="fas fa-check"></i>' : 'التالي <i class="fas fa-arrow-left"></i>';

    renderDots();
}

function isAnswered(q){
    if(q.type==='mcq') return answers[q.id]!==undefined;
    if(q.type==='written') return writtenUploads[q.id]!==undefined;
    if(q.type==='match'){
        const items = q.match_items||[];
        const ans = matchAnswers[q.id]||{};
        return items.length>0 && items.every((it,idx)=> ans[idx] && ans[idx]!=='');
    }
    return false;
}
function selectMatch(qId, idx, value){
    matchAnswers[qId] = matchAnswers[qId] || {};
    matchAnswers[qId][idx] = value;
    const stage = stagesList[currentStageIdx];
    const q = stage.questions[currentQuestionIdx];
    document.getElementById('nextBtn').disabled = !isAnswered(q);
    renderDots();
}
function renderDots(){
    const stage = stagesList[currentStageIdx];
    const container = document.getElementById('dotsContainer');
    container.innerHTML='';
    stage.questions.forEach((q,i)=>{
        const dot=document.createElement('div');
        dot.className='dot'+(i===currentQuestionIdx?' active':'')+(isAnswered(q)?' answered':'');
        dot.textContent = i+1;
        dot.onclick=()=>{ currentQuestionIdx=i; renderQuestion(); };
        container.appendChild(dot);
    });
}
function uploadWrittenSolution(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
        const q = stagesList[currentStageIdx].questions[currentQuestionIdx];
        writtenUploads[q.id] = e.target.result;
        renderQuestion();
    };
    reader.readAsDataURL(file);
}
function nextQuestion(){
    const stage = stagesList[currentStageIdx];
    const q = stage.questions[currentQuestionIdx];
    if(!isAnswered(q)){ alert('⚠️ يرجى حل السؤال قبل الانتقال'); return; }
    if(currentQuestionIdx < stage.questions.length-1){ currentQuestionIdx++; renderQuestion(); }
    else finishStage();
}
function prevQuestion(){ if(currentQuestionIdx>0){ currentQuestionIdx--; renderQuestion(); } }

async function finishStage(){
    clearInterval(timerInterval);
    const stage = stagesList[currentStageIdx];
    let score=0, correctCount=0, hasWritten=false;
    stage.questions.forEach(q=>{
        if(q.type==='mcq'){ if(answers[q.id]===q.correct_index){ score += q.marks||1; correctCount++; } }
        else if(q.type==='match'){
            const items = q.match_items||[];
            const ans = matchAnswers[q.id]||{};
            const perItem = items.length ? (q.marks||items.length) / items.length : 0;
            let matchCorrect = 0;
            items.forEach((it,idx)=>{ if(ans[idx]===it.correct) matchCorrect++; });
            score += matchCorrect * perItem;
            if(matchCorrect===items.length && items.length>0) correctCount++;
        }
        else if(q.type==='written'){ hasWritten = true; }
    });
    const total = stage.questions.reduce((sum,q)=>sum+(q.marks||1),0);

    const { error } = await sb.rpc('submit_exam_result', {
        p_student_id: studentId, p_secret_code: secretCode, p_subject: stage.subject,
        p_score: hasWritten ? null : score, p_total: total,
        p_correct_count: correctCount, p_total_questions: stage.questions.length,
        p_answers: {...answers, ...matchAnswers}, p_written_uploads: writtenUploads, p_has_written: hasWritten
    });
    if(error){ alert('❌ حدث خطأ أثناء حفظ النتيجة: '+error.message); return; }

    allResults.push({ subject: stage.subject, score: hasWritten?null:score, total, hasWritten });

    if(currentStageIdx < stagesList.length-1){
        alert(`✅ تم إكمال ${SUBJECT_LABELS[stage.subject]}! سيتم الانتقال إلى المادة التالية.`);
        startStage(currentStageIdx+1);
    } else {
        showFinalResult();
    }
}

function showFinalResult(){
    let html='';
    let totalScore=0, totalMarks=0, anyWaiting=false;
    allResults.forEach(r=>{
        totalMarks += r.total;
        if(r.hasWritten){ anyWaiting=true; html += `<p>${SUBJECT_LABELS[r.subject]}: بانتظار تصحيح المعلم</p>`; }
        else { totalScore += r.score; html += `<p>${SUBJECT_LABELS[r.subject]}: ${r.score} / ${r.total}</p>`; }
    });
    document.getElementById('questionContainer').innerHTML = `
        <div class="final-result">
            <h2>🎉 تم إكمال جميع مراحل الاختبار</h2>
            ${anyWaiting ? '<p style="color:#888;">بعض النتائج تحتاج تصحيح المعلم لأسئلة كتابية</p>' : ''}
            <div class="total-score">${totalScore} / ${totalMarks}</div>
            ${html}
            <p style="color:#888;margin-top:10px;">يمكنك إغلاق هذه الصفحة الآن، ستصلك النتيجة النهائية من المدرسة.</p>
        </div>`;
    document.getElementById('dotsContainer').classList.add('hidden');
    document.querySelector('.exam-actions').classList.add('hidden');
    document.getElementById('timerDisplay').textContent='⏱️ انتهى';
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        timerSeconds--;
        const m=Math.floor(timerSeconds/60), s=timerSeconds%60;
        document.getElementById('timerDisplay').textContent = '⏱️ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        if(timerSeconds<=0){ clearInterval(timerInterval); alert('⏰ انتهى الوقت!'); finishStage(); }
    }, 1000);
}

init();
</script>
</body>
</html>
